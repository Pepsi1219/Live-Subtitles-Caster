<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Subtitles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <div id="status-wrapper">
            <i class="fa-solid fa-closed-captioning"></i>
            <span id="status-indicator">READY</span>
        </div>

        <div id="btn-group">
            <button id="btn-theme" title="สลับโหมดมืด/สว่าง">
                <i class="fa-solid fa-sun"></i>
            </button>
            <button id="btn-mic" title="เปิด/ปิดไมค์">
                <i class="fa-solid fa-microphone-slash"></i>
            </button>
            <button id="btn-obs" title="โหมด OBS (กด Esc เพื่อออก)">
                <i class="fa-solid fa-clapperboard"></i>
            </button>
            <button id="btn-settings" title="ตั้งค่า">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <div id="settings-panel" class="hidden">
        <h3>Settings</h3>

        <div class="setting-row">
            <label for="source-lang">Spoken Language (พูด)</label>
            <select id="source-lang">
                <option value="th-TH">Thai (ไทย)</option>
                <option value="en-US">English</option>
                <option value="zh-CN">Chinese (จีน)</option>
            </select>
        </div>

        <div class="setting-row">
            <label for="target-lang">Subtitle Language (แปล)</label>
            <select id="target-lang">
                <option value="en">English</option>
                <option value="th">Thai (ไทย)</option>
                <option value="zh">Chinese (จีน)</option>
            </select>
        </div>

        <div class="setting-row">
            <label for="api-key-input">Anthropic API Key</label>
            <div id="api-key-wrapper">
                <input type="password" id="api-key-input" placeholder="sk-ant-..." spellcheck="false">
                <button id="btn-save-key">Save</button>
            </div>
            <span id="api-key-status"></span>
        </div>
    </div>

    <main id="subtitle-area">
        <p id="source-text"></p>
        <p id="translated-text"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
